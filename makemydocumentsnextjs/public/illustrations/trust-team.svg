<svg viewBox="0 0 320 280" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="tshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background blob -->
  <circle cx="160" cy="140" r="120" fill="#dbeafe" opacity=".5"/>
  <circle cx="240" cy="80" r="50" fill="#ede9fe" opacity=".6"/>

  <!-- Shield with checkmark -->
  <g filter="url(#tshadow)">
    <path d="M160 30 L100 52 V130 c0 38 25 70 60 80 35-10 60-42 60-80 V52 L160 30Z" fill="url(#shield)"/>
    <path d="M160 30 L100 52 V130 c0 38 25 70 60 80 35-10 60-42 60-80 V52 L160 30Z" fill="none" stroke="#fff" stroke-opacity=".25" stroke-width="1.5"/>
    <path d="M130 130l22 22 38-44" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Ribbon banner -->
  <g filter="url(#tshadow)">
    <path d="M120 200 L160 188 L200 200 L195 240 L160 230 L125 240 Z" fill="url(#ribbon)"/>
    <text x="160" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#fff" letter-spacing="1.5">CSC APPROVED</text>
  </g>

  <!-- People icons floating around shield -->
  <g filter="url(#tshadow)">
    <circle cx="60" cy="100" r="22" fill="#fff"/>
    <circle cx="60" cy="92" r="6" fill="#a78bfa"/>
    <path d="M48 112c0-7 5-12 12-12s12 5 12 12" fill="#a78bfa"/>
  </g>
  <g filter="url(#tshadow)">
    <circle cx="260" cy="100" r="22" fill="#fff"/>
    <circle cx="260" cy="92" r="6" fill="#10b981"/>
    <path d="M248 112c0-7 5-12 12-12s12 5 12 12" fill="#10b981"/>
  </g>
  <g filter="url(#tshadow)">
    <circle cx="50" cy="180" r="18" fill="#fff"/>
    <circle cx="50" cy="174" r="5" fill="#f472b6"/>
    <path d="M40 188c0-6 4-10 10-10s10 4 10 10" fill="#f472b6"/>
  </g>
  <g filter="url(#tshadow)">
    <circle cx="270" cy="180" r="18" fill="#fff"/>
    <circle cx="270" cy="174" r="5" fill="#fbbf24"/>
    <path d="M260 188c0-6 4-10 10-10s10 4 10 10" fill="#fbbf24"/>
  </g>

  <!-- Connection lines -->
  <g stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 4" opacity=".5" fill="none">
    <path d="M82 100 Q120 90 130 110"/>
    <path d="M238 100 Q200 90 190 110"/>
    <path d="M68 180 Q100 170 120 170"/>
    <path d="M252 180 Q220 170 200 170"/>
  </g>

  <!-- Sparkles -->
  <path d="M40 40l2 6 6 2-6 2-2 6-2-6-6-2 6-2z" fill="#fbbf24" opacity=".85"/>
  <path d="M280 240l2 5 5 2-5 2-2 5-2-5-5-2 5-2z" fill="#a78bfa" opacity=".85"/>
  <circle cx="290" cy="50" r="3" fill="#10b981" opacity=".7"/>
  <circle cx="30" cy="240" r="3" fill="#3b82f6" opacity=".7"/>
</svg>
