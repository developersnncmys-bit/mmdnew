<svg viewBox="0 0 240 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="pd-box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="pd-house" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="pd-check" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="pd-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
      <feOffset dy="3"/>
      <feComponentTransfer><feFuncA type="linear" slope=".2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="120" cy="100" r="80" fill="#dcfce7" opacity=".5"/>

  <g filter="url(#pd-shadow)">
    <path d="M150 60 L210 90 V150 a4 4 0 0 1 -4 4 H150 Z" fill="url(#pd-house)"/>
    <path d="M150 60 L210 90" stroke="#fff" stroke-opacity=".3" stroke-width="1"/>
    <rect x="160" y="110" width="20" height="44" rx="2" fill="#fbbf24" opacity=".95"/>
    <rect x="190" y="110" width="14" height="14" rx="2" fill="#fff" opacity=".4"/>
    <circle cx="178" cy="132" r="1.5" fill="#1e3a8a"/>
  </g>

  <g filter="url(#pd-shadow)">
    <path d="M40 90 L100 70 L160 90 V150 a4 4 0 0 1 -4 4 H44 a4 4 0 0 1 -4-4 Z" fill="url(#pd-box)"/>
    <path d="M40 90 L100 110 L160 90" stroke="#fff" stroke-opacity=".4" stroke-width="2" fill="none"/>
    <path d="M100 70 V110" stroke="#fff" stroke-opacity=".4" stroke-width="2"/>
    <rect x="80" y="98" width="40" height="6" rx="2" fill="#fff" opacity=".7"/>
    <rect x="86" y="80" width="28" height="3" rx="1.5" fill="#fff" opacity=".55"/>
  </g>

  <g filter="url(#pd-shadow)" transform="rotate(-8 80 70)">
