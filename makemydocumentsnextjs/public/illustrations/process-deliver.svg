    <rect x="66" y="68" width="22" height="2" rx="1" fill="#e2e8f0"/>
    <rect x="66" y="74" width="26" height="2" rx="1" fill="#e2e8f0"/>
    <rect x="66" y="80" width="20" height="2" rx="1" fill="#e2e8f0"/>
    <circle cx="84" cy="90" r="6" fill="#10b981" opacity=".15"/>
    <path d="M80 90l3 3 5-6" stroke="#10b981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

