<svg viewBox="0 0 480 400" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="aff-doc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="aff-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="aff-gavel-handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#92400e"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="aff-gavel-head" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a16207"/>
      <stop offset="1" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="aff-block" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#78350f"/>
      <stop offset="1" stop-color="#451a03"/>
    </linearGradient>
    <filter id="aff-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="240" cy="200" r="170" fill="#fef3c7" opacity=".55"/>
  <circle cx="120" cy="120" r="60" fill="#fed7aa" opacity=".5"/>

  <!-- Affidavit document base (back) -->
  <g filter="url(#aff-shadow)" transform="rotate(8 280 200)">
    <rect x="180" y="80" width="180" height="240" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect x="195" y="100" width="120" height="4" rx="2" fill="#cbd5e1"/>
    <rect x="195" y="115" width="100" height="3" rx="1.5" fill="#e2e8f0"/>
    <rect x="195" y="125" width="130" height="3" rx="1.5" fill="#e2e8f0"/>
  </g>

  <!-- Affidavit document main (front) -->
  <g filter="url(#aff-shadow)">
    <rect x="100" y="60" width="200" height="270" rx="10" fill="url(#aff-doc)"/>
    <!-- Header bar -->
    <rect x="100" y="60" width="200" height="48" rx="10" fill="url(#aff-header)"/>
    <rect x="100" y="98" width="200" height="10" fill="url(#aff-header)"/>
    <text x="200" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#fff" letter-spacing="3">AFFIDAVIT</text>

    <!-- Body content lines -->
    <g transform="translate(118 130)">
      <rect width="60" height="3" rx="1.5" fill="#94a3b8"/>
      <rect y="10" width="164" height="3" rx="1.5" fill="#e2e8f0"/>
      <rect y="20" width="150" height="3" rx="1.5" fill="#e2e8f0"/>
      <rect y="30" width="140" height="3" rx="1.5" fill="#e2e8f0"/>
      <rect y="40" width="160" height="3" rx="1.5" fill="#e2e8f0"/>
    </g>

    <!-- "I, the undersigned" callout -->
    <g transform="translate(118 188)">
      <rect width="164" height="40" rx="4" fill="#fef3c7"/>
      <text x="8" y="14" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="#a16207" letter-spacing=".5">DECLARATION</text>
      <rect x="8" y="20" width="120" height="3" rx="1.5" fill="#a16207" opacity=".4"/>
      <rect x="8" y="28" width="100" height="3" rx="1.5" fill="#a16207" opacity=".3"/>
    </g>

    <!-- More body lines -->
    <g transform="translate(118 240)">
      <rect width="164" height="3" rx="1.5" fill="#e2e8f0"/>
      <rect y="10" width="140" height="3" rx="1.5" fill="#e2e8f0"/>
    </g>

    <!-- Signature -->
    <g transform="translate(118 270)">
      <text font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#94a3b8" letter-spacing=".5">DEPONENT</text>
      <path d="M0 18 Q14 8 26 16 T58 14 T96 18" stroke="#dc2626" stroke-width="2" stroke-linecap="round" fill="none"/>
      <rect y="28" width="100" height="2" rx="1" fill="#cbd5e1"/>
    </g>

    <!-- Red corner ribbon -->
    <path d="M280 60 L300 60 L300 80 L290 76 L280 80 Z" fill="#dc2626"/>
  </g>

  <!-- Notary stamp (round, red) -->
  <g filter="url(#aff-shadow)" transform="rotate(-12 250 270)">
    <circle cx="250" cy="270" r="32" fill="none" stroke="#dc2626" stroke-width="2.5" opacity=".95"/>
    <circle cx="250" cy="270" r="26" fill="none" stroke="#dc2626" stroke-width="1" opacity=".7"/>
    <text x="250" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="800" fill="#dc2626" letter-spacing="1">NOTARIZED</text>
    <text x="250" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="5" font-weight="600" fill="#dc2626" opacity=".8">KARNATAKA</text>
    <path d="M242 282 L246 286 L258 274" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Gavel (large, prominent) -->
  <g filter="url(#aff-shadow)" transform="translate(305 145) rotate(-25)">
    <!-- Handle -->
    <rect x="0" y="6" width="120" height="14" rx="3" fill="url(#aff-gavel-handle)"/>
    <rect x="0" y="6" width="120" height="3" rx="1.5" fill="#fbbf24" opacity=".4"/>
    <!-- Grip rings -->
    <rect x="6" y="5" width="2" height="16" fill="#451a03"/>
    <rect x="14" y="5" width="2" height="16" fill="#451a03"/>
    <rect x="22" y="5" width="2" height="16" fill="#451a03"/>
    <!-- Head -->
    <rect x="100" y="-10" width="56" height="46" rx="4" fill="url(#aff-gavel-head)"/>
    <rect x="100" y="-10" width="56" height="8" fill="#451a03" opacity=".4"/>
    <rect x="100" y="30" width="56" height="6" fill="#451a03" opacity=".4"/>
    <!-- Decorative ring on head -->
    <rect x="120" y="-10" width="3" height="46" fill="#fbbf24" opacity=".5"/>
    <rect x="135" y="-10" width="3" height="46" fill="#fbbf24" opacity=".5"/>
  </g>

  <!-- Sound block (under gavel) -->
  <g filter="url(#aff-shadow)" transform="translate(330 290)">
    <rect x="0" y="0" width="100" height="20" rx="4" fill="url(#aff-block)"/>
    <rect x="0" y="0" width="100" height="6" rx="2" fill="#fbbf24" opacity=".4"/>
    <rect x="-8" y="18" width="116" height="8" rx="2" fill="#451a03"/>
  </g>

  <!-- Scales of justice icon (small, decorative) -->
  <g transform="translate(60 200)" opacity=".7">
    <rect x="9" y="0" width="2" height="50" fill="#92400e"/>
    <rect x="0" y="0" width="20" height="3" rx="1" fill="#92400e"/>
    <line x1="3" y1="3" x2="-3" y2="14" stroke="#92400e" stroke-width="1"/>
    <line x1="17" y1="3" x2="23" y2="14" stroke="#92400e" stroke-width="1"/>
    <ellipse cx="0" cy="16" rx="6" ry="2" fill="#fbbf24"/>
    <ellipse cx="20" cy="16" rx="6" ry="2" fill="#fbbf24"/>
    <rect x="4" y="50" width="12" height="3" rx="1" fill="#92400e"/>
  </g>

  <!-- Pen with ink drops -->
  <g filter="url(#aff-shadow)" transform="translate(50 320) rotate(-15)">
    <rect x="0" y="0" width="70" height="8" rx="2" fill="#1e293b"/>
    <rect x="0" y="0" width="70" height="2" rx="1" fill="#475569"/>
    <path d="M70 0 L84 4 L70 8 Z" fill="#fbbf24"/>
    <rect x="-4" y="2" width="4" height="4" rx="1" fill="#475569"/>
  </g>
  <circle cx="125" cy="345" r="3" fill="#1e3a8a" opacity=".6"/>
  <circle cx="135" cy="355" r="2" fill="#1e3a8a" opacity=".4"/>

  <!-- Sparkles -->
  <path d="M50 60l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#fbbf24"/>
  <path d="M420 350l2 6 6 2-6 2-2 6-2-6-6-2 6-2z" fill="#a78bfa" opacity=".8"/>
  <circle cx="430" cy="80" r="4" fill="#dc2626" opacity=".7"/>
  <circle cx="40" cy="160" r="3" fill="#1e3a8a" opacity=".6"/>
</svg>
