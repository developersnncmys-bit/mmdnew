<svg viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="320" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" />
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="320" height="320" rx="24" fill="url(#bg)" opacity="0"/>

  <!-- Back document -->
  <g filter="url(#shadow)" transform="rotate(-8 100 160)">
    <rect x="40" y="80" width="120" height="160" rx="10" fill="#fff"/>
    <rect x="55" y="100" width="60" height="6" rx="3" fill="#cbd5e1"/>
    <rect x="55" y="115" width="90" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="55" y="125" width="80" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="55" y="135" width="70" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="55" y="155" width="40" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="55" y="165" width="55" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="55" y="195" width="80" height="20" rx="4" fill="#dbeafe"/>
  </g>

  <!-- Front document -->
  <g filter="url(#shadow)" transform="rotate(6 200 170)">
    <rect x="130" y="60" width="140" height="180" rx="12" fill="#fff"/>
    <rect x="130" y="60" width="140" height="40" rx="12" fill="url(#primary)"/>
    <rect x="130" y="92" width="140" height="8" fill="url(#primary)"/>
    <circle cx="150" cy="80" r="8" fill="#fff" opacity=".25"/>
    <rect x="165" y="74" width="50" height="5" rx="2.5" fill="#fff"/>
    <rect x="165" y="83" width="35" height="4" rx="2" fill="#fff" opacity=".7"/>
    <rect x="148" y="120" width="104" height="5" rx="2.5" fill="#cbd5e1"/>
    <rect x="148" y="135" width="80" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="148" y="145" width="92" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="148" y="155" width="70" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="148" y="175" width="60" height="4" rx="2" fill="#e2e8f0"/>
    <rect x="148" y="185" width="80" height="4" rx="2" fill="#e2e8f0"/>
    <!-- Signature line -->
    <path d="M148 215c8-4 14 2 22-2s14 4 22 0 14 2 22-2" stroke="#6366f1" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Approved stamp -->
  <g transform="rotate(-12 240 220)">
    <circle cx="240" cy="220" r="32" fill="none" stroke="#10b981" stroke-width="3" opacity=".85"/>
    <circle cx="240" cy="220" r="26" fill="none" stroke="#10b981" stroke-width="1.5" opacity=".6"/>
    <text x="240" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#10b981">APPROVED</text>
    <path d="M222 230l5 5 12-12" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Floating check badge -->
  <g filter="url(#shadow)">
    <circle cx="70" cy="60" r="22" fill="url(#accent)"/>
    <path d="M60 60l7 7 14-14" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Floating sparkle -->
  <g opacity=".8">
    <path d="M280 80l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#fbbf24"/>
  </g>
  <g opacity=".7">
    <path d="M50 270l2 5 5 2-5 2-2 5-2-5-5-2 5-2z" fill="#a78bfa"/>
  </g>
</svg>
