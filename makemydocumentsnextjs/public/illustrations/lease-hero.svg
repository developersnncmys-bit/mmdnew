<svg viewBox="0 0 480 400" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="lh-doc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="lh-header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="lh-building" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#475569"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="lh-roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="lh-key" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="lh-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope=".22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <circle cx="240" cy="200" r="170" fill="#dcfce7" opacity=".5"/>
  <circle cx="360" cy="120" r="60" fill="#dbeafe" opacity=".7"/>

  <!-- Commercial building behind -->
  <g filter="url(#lh-shadow)" transform="translate(290 80)">
    <rect x="0" y="40" width="120" height="150" rx="2" fill="url(#lh-building)"/>
    <path d="M-8 44 L60 0 L128 44" stroke="url(#lh-roof)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <g fill="#0ea5e9" opacity=".55">
      <rect x="12" y="58" width="14" height="14" rx="1"/>
      <rect x="34" y="58" width="14" height="14" rx="1"/>
      <rect x="56" y="58" width="14" height="14" rx="1"/>
      <rect x="78" y="58" width="14" height="14" rx="1"/>
      <rect x="100" y="58" width="14" height="14" rx="1"/>
      <rect x="12" y="84" width="14" height="14" rx="1"/>
      <rect x="34" y="84" width="14" height="14" rx="1"/>
      <rect x="56" y="84" width="14" height="14" rx="1"/>
      <rect x="78" y="84" width="14" height="14" rx="1"/>
      <rect x="100" y="84" width="14" height="14" rx="1"/>
      <rect x="12" y="110" width="14" height="14" rx="1"/>
      <rect x="34" y="110" width="14" height="14" rx="1"/>
      <rect x="56" y="110" width="14" height="14" rx="1"/>
      <rect x="78" y="110" width="14" height="14" rx="1"/>
      <rect x="100" y="110" width="14" height="14" rx="1"/>
    </g>
    <rect x="48" y="142" width="24" height="48" rx="2" fill="#0c4a6e"/>
    <circle cx="65" cy="166" r="2" fill="#fbbf24"/>
  </g>

  <!-- Lease document -->
  <g filter="url(#lh-shadow)" transform="rotate(-4 200 220)">
    <rect x="60" y="80" width="220" height="280" rx="12" fill="url(#lh-doc)"/>
    <rect x="60" y="80" width="220" height="50" rx="12" fill="url(#lh-header)"/>
    <rect x="60" y="118" width="220" height="12" fill="url(#lh-header)"/>

    <circle cx="86" cy="105" r="12" fill="#fff" opacity=".25"/>
    <path d="M82 105 L82 100 a4 4 0 0 1 8 0 L90 105 M80 105 h12 v6 h-12 z" stroke="#fff" stroke-width="1.5" fill="none"/>
    <text x="106" y="103" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#fff" letter-spacing="1">LEASE AGREEMENT</text>
    <text x="106" y="116" font-family="Arial, sans-serif" font-size="7" font-weight="600" fill="#fff" opacity=".8" letter-spacing=".5">LONG-TERM · REGISTERED · LEGALLY BINDING</text>

    <!-- Lessor / Lessee rows -->
    <g transform="translate(78 152)">
      <text font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing=".5">LESSOR</text>
      <rect y="11" width="80" height="4" rx="2" fill="#1e293b"/>
      <rect y="20" width="60" height="3" rx="1.5" fill="#cbd5e1"/>
    </g>
    <g transform="translate(180 152)">
      <text font-family="Arial, sans-serif" font-size="8" font-weight="700" fill="#94a3b8" letter-spacing=".5">LESSEE</text>
      <rect y="11" width="80" height="4" rx="2" fill="#1e293b"/>
      <rect y="20" width="60" height="3" rx="1.5" fill="#cbd5e1"/>
    </g>

    <g transform="translate(78 192)">
      <rect width="184" height="3" rx="1.5" fill="#e2e8f0"/>
      <rect y="8" width="170" height="3" rx="1.5" fill="#e2e8f0"/>
      <rect y="16" width="190" height="3" rx="1.5" fill="#e2e8f0"/>
      <rect y="24" width="160" height="3" rx="1.5" fill="#e2e8f0"/>
    </g>

    <!-- Lease-specific boxes: duration + escalation -->
    <g transform="translate(78 232)">
      <rect width="86" height="40" rx="4" fill="#dcfce7"/>
      <text x="8" y="14" font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#16a34a" letter-spacing=".5">TENURE</text>
      <text x="8" y="28" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#14532d">3 YEARS</text>
      <text x="8" y="36" font-family="Arial, sans-serif" font-size="5" fill="#64748b">+ renewal option</text>
    </g>
    <g transform="translate(176 232)">
      <rect width="86" height="40" rx="4" fill="#dbeafe"/>
      <text x="8" y="14" font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#2563eb" letter-spacing=".5">ESCALATION</text>
      <text x="8" y="28" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#1e3a8a">5% / yr</text>
      <text x="8" y="36" font-family="Arial, sans-serif" font-size="5" fill="#64748b">annual</text>
    </g>

    <!-- Tags -->
    <g transform="translate(78 282)" font-family="Arial, sans-serif" font-size="6" font-weight="600">
      <rect width="50" height="14" rx="7" fill="#ede9fe"/>
      <text x="25" y="9.5" text-anchor="middle" fill="#7c3aed">REGISTERED</text>
      <rect x="56" width="48" height="14" rx="7" fill="#fef3c7"/>
      <text x="80" y="9.5" text-anchor="middle" fill="#a16207">LOCK-IN</text>
      <rect x="110" width="62" height="14" rx="7" fill="#fce7f3"/>
      <text x="141" y="9.5" text-anchor="middle" fill="#be185d">COMMERCIAL</text>
    </g>

    <!-- Signature block -->
    <g transform="translate(78 314)">
      <text font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#94a3b8">SIGNATURE</text>
      <path d="M0 18 Q14 8 26 16 T58 14 T96 18" stroke="#0f766e" stroke-width="2" stroke-linecap="round" fill="none"/>
      <rect y="28" width="100" height="2" rx="1" fill="#cbd5e1"/>
    </g>
    <g transform="translate(186 314)">
      <text font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#94a3b8">REGISTERED</text>
      <text x="0" y="22" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#1e293b">SUB-REG OFFICE</text>
      <rect y="28" width="80" height="2" rx="1" fill="#cbd5e1"/>
    </g>
  </g>

  <!-- Calendar/clock icon (for long-term) -->
  <g filter="url(#lh-shadow)" transform="translate(330 250)">
    <rect x="0" y="0" width="64" height="60" rx="6" fill="#fff"/>
    <rect x="0" y="0" width="64" height="14" rx="6" fill="#10b981"/>
    <text x="32" y="10.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" font-weight="800" fill="#fff" letter-spacing="1">3-YEAR</text>
    <text x="32" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#0f172a">36</text>
    <text x="32" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="600" fill="#64748b">months</text>
  </g>

  <!-- Approved stamp -->
  <g filter="url(#lh-shadow)" transform="rotate(-12 340 280)">
    <circle cx="340" cy="280" r="38" fill="none" stroke="#10b981" stroke-width="3" opacity=".95"/>
    <circle cx="340" cy="280" r="32" fill="none" stroke="#10b981" stroke-width="1.4" opacity=".7"/>
    <text x="340" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="800" fill="#10b981">REGISTERED</text>
    <text x="340" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="6" font-weight="700" fill="#10b981" opacity=".8">SUB-REGISTRAR</text>
  </g>

  <!-- Key with keychain -->
  <g filter="url(#lh-shadow)" transform="translate(50 280) rotate(-25)">
    <circle cx="20" cy="20" r="16" fill="none" stroke="url(#lh-key)" stroke-width="6"/>
    <circle cx="20" cy="20" r="6" fill="none" stroke="url(#lh-key)" stroke-width="3"/>
    <rect x="34" y="18" width="50" height="6" rx="1" fill="url(#lh-key)"/>
    <rect x="76" y="14" width="4" height="14" rx="1" fill="url(#lh-key)"/>
    <rect x="68" y="14" width="4" height="10" rx="1" fill="url(#lh-key)"/>
  </g>

  <!-- Pen -->
  <g filter="url(#lh-shadow)" transform="translate(30 130) rotate(35)">
    <rect x="0" y="0" width="80" height="10" rx="2" fill="#0f172a"/>
    <rect x="0" y="0" width="80" height="3" rx="1.5" fill="#334155"/>
    <path d="M80 0 L96 5 L80 10 Z" fill="#10b981"/>
    <rect x="-6" y="2" width="6" height="6" rx="1" fill="#475569"/>
  </g>

  <path d="M40 60l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#10b981" opacity=".9"/>
  <path d="M430 350l2 6 6 2-6 2-2 6-2-6-6-2 6-2z" fill="#a78bfa" opacity=".8"/>
  <circle cx="420" cy="60" r="4" fill="#0ea5e9" opacity=".7"/>
  <circle cx="60" cy="370" r="4" fill="#10b981" opacity=".6"/>
</svg>
