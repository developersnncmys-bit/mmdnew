<svg viewBox="0 0 600 480" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="plane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f1f5f9"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="planeWindow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="vh-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
      <feOffset dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope=".25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky / blue dome backdrop -->
  <ellipse cx="300" cy="260" rx="260" ry="190" fill="url(#dome)"/>
  <ellipse cx="300" cy="260" rx="260" ry="190" fill="none" stroke="#fff" stroke-opacity=".3" stroke-width="2"/>

  <!-- Cloud silhouettes inside dome -->
  <g fill="#fff" opacity=".35">
    <ellipse cx="140" cy="170" rx="30" ry="10"/>
    <ellipse cx="460" cy="200" rx="36" ry="12"/>
    <ellipse cx="380" cy="140" rx="24" ry="8"/>
  </g>

  <!-- Statue of Liberty (left) -->
  <g transform="translate(120 200)">
    <rect x="-3" y="60" width="50" height="20" rx="2" fill="#475569"/>
    <rect x="2" y="50" width="40" height="14" rx="2" fill="#64748b"/>
    <path d="M22 50 V20 L18 12 L26 12 L22 20" fill="#86efac" stroke="#22c55e" stroke-width="0.5"/>
    <path d="M22 12 L16 4 L20 6 L22 0 L24 6 L28 4 Z" fill="#86efac"/>
    <path d="M22 30 L10 28 L14 38 Z" fill="#86efac"/>
    <circle cx="22" cy="9" r="3" fill="#fde68a"/>
  </g>

  <!-- Big Ben (center-left) -->
  <g transform="translate(190 180)">
    <rect x="0" y="50" width="38" height="80" fill="#a16207"/>
    <rect x="0" y="50" width="38" height="80" fill="#92400e" opacity=".4"/>
    <rect x="-4" y="44" width="46" height="10" fill="#78350f"/>
    <rect x="2" y="20" width="34" height="26" fill="#fef3c7"/>
    <circle cx="19" cy="33" r="9" fill="#fff" stroke="#78350f" stroke-width="1.5"/>
    <path d="M19 33 L19 27 M19 33 L24 33" stroke="#78350f" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M0 20 L19 0 L38 20 Z" fill="#78350f"/>
    <rect x="17" y="-8" width="4" height="10" fill="#78350f"/>
    <circle cx="19" cy="-10" r="2" fill="#fbbf24"/>
    <rect x="6" y="62" width="6" height="14" fill="#fef3c7" rx="1"/>
    <rect x="16" y="62" width="6" height="14" fill="#fef3c7" rx="1"/>
    <rect x="26" y="62" width="6" height="14" fill="#fef3c7" rx="1"/>
    <rect x="6" y="84" width="6" height="14" fill="#fef3c7" rx="1"/>
    <rect x="16" y="84" width="6" height="14" fill="#fef3c7" rx="1"/>
    <rect x="26" y="84" width="6" height="14" fill="#fef3c7" rx="1"/>
  </g>

  <!-- Leaning Tower of Pisa (center) -->
  <g transform="translate(280 220) rotate(-6)">
    <rect x="0" y="0" width="28" height="80" fill="#f5f5dc" stroke="#a8a29e" stroke-width="1"/>
    <g stroke="#a8a29e" stroke-width="0.6" fill="none">
      <line x1="0" y1="14" x2="28" y2="14"/>
      <line x1="0" y1="28" x2="28" y2="28"/>
      <line x1="0" y1="42" x2="28" y2="42"/>
      <line x1="0" y1="56" x2="28" y2="56"/>
      <line x1="0" y1="70" x2="28" y2="70"/>
    </g>
    <g fill="#78716c">
      <circle cx="6" cy="20" r="1"/>
      <circle cx="14" cy="20" r="1"/>
      <circle cx="22" cy="20" r="1"/>
      <circle cx="6" cy="34" r="1"/>
      <circle cx="14" cy="34" r="1"/>
      <circle cx="22" cy="34" r="1"/>
      <circle cx="6" cy="48" r="1"/>
      <circle cx="14" cy="48" r="1"/>
      <circle cx="22" cy="48" r="1"/>
      <circle cx="6" cy="62" r="1"/>
      <circle cx="14" cy="62" r="1"/>
      <circle cx="22" cy="62" r="1"/>
    </g>
    <rect x="-3" y="-6" width="34" height="6" fill="#a8a29e"/>
    <rect x="2" y="-12" width="24" height="6" fill="#dc2626" opacity=".7"/>
  </g>

  <!-- Eiffel Tower (center-right) -->
  <g transform="translate(340 130)">
    <path d="M30 0 L26 30 L34 30 Z" fill="#78350f"/>
    <rect x="29" y="0" width="2" height="-10" fill="#78350f"/>
    <path d="M22 30 L38 30 L40 70 L20 70 Z" fill="#92400e"/>
    <path d="M20 70 L40 70 L46 110 L14 110 Z" fill="#a16207"/>
    <path d="M14 110 L46 110 L54 165 L6 165 Z" fill="#b45309"/>
    <path d="M6 165 L54 165 L60 200 L0 200 Z" fill="#ca8a04"/>
    <line x1="22" y1="30" x2="38" y2="70" stroke="#451a03" stroke-width="0.8"/>
    <line x1="38" y1="30" x2="22" y2="70" stroke="#451a03" stroke-width="0.8"/>
    <line x1="20" y1="70" x2="40" y2="110" stroke="#451a03" stroke-width="0.8"/>
    <line x1="40" y1="70" x2="20" y2="110" stroke="#451a03" stroke-width="0.8"/>
    <line x1="14" y1="110" x2="46" y2="165" stroke="#451a03" stroke-width="0.8"/>
    <line x1="46" y1="110" x2="14" y2="165" stroke="#451a03" stroke-width="0.8"/>
    <rect x="14" y="100" width="32" height="6" fill="#78350f"/>
    <rect x="6" y="160" width="48" height="6" fill="#78350f"/>
  </g>

  <!-- St Basil's Cathedral (right) -->
  <g transform="translate(440 200)">
    <rect x="6" y="60" width="60" height="50" fill="#fde68a"/>
    <rect x="6" y="60" width="60" height="50" fill="#f59e0b" opacity=".25"/>
    <!-- Center dome -->
    <path d="M30 30 Q30 8 36 8 Q42 8 42 30" fill="#fef3c7"/>
    <ellipse cx="36" cy="30" rx="10" ry="3" fill="#dc2626"/>
    <rect x="34" y="0" width="4" height="10" fill="#a16207"/>
    <circle cx="36" cy="-2" r="2" fill="#fbbf24"/>
    <rect x="28" y="30" width="16" height="30" fill="#dc2626"/>
    <rect x="32" y="40" width="8" height="20" fill="#fef3c7" rx="4"/>
    <!-- Left dome -->
    <path d="M8 50 Q8 38 14 38 Q20 38 20 50" fill="#86efac"/>
    <path d="M8 50 Q8 42 14 42 Q20 42 20 50" fill="#22c55e" opacity=".5"/>
    <rect x="13" y="32" width="2" height="8" fill="#a16207"/>
    <rect x="6" y="50" width="16" height="20" fill="#22c55e"/>
    <!-- Right dome -->
    <path d="M52 50 Q52 38 58 38 Q64 38 64 50" fill="#fda4af"/>
    <path d="M52 50 Q52 44 58 44 Q64 44 64 50" fill="#f43f5e" opacity=".5"/>
    <rect x="57" y="32" width="2" height="8" fill="#a16207"/>
    <rect x="50" y="50" width="16" height="20" fill="#f43f5e"/>
    <!-- Far left small dome -->
    <path d="M-2 60 Q-2 52 2 52 Q6 52 6 60" fill="#a78bfa"/>
    <rect x="-2" y="60" width="8" height="10" fill="#7c3aed"/>
    <!-- Far right small dome -->
    <path d="M66 60 Q66 52 70 52 Q74 52 74 60" fill="#60a5fa"/>
    <rect x="66" y="60" width="8" height="10" fill="#3b82f6"/>
  </g>

  <!-- Palm trees (foreground left) -->
  <g transform="translate(80 340)">
    <rect x="14" y="0" width="4" height="40" fill="#78350f"/>
    <path d="M16 0 Q4 -4 -2 6" stroke="#22c55e" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M16 0 Q28 -6 38 4" stroke="#22c55e" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M16 0 Q12 -16 4 -22" stroke="#22c55e" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M16 0 Q22 -16 30 -22" stroke="#22c55e" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Airplane (large, in front) -->
  <g filter="url(#vh-shadow)" transform="translate(140 340)">
    <!-- Wings (back, behind body) -->
    <path d="M-30 30 L60 18 L150 18 L240 30 L240 50 L150 60 L60 60 L-30 50 Z" fill="url(#plane)" stroke="#94a3b8" stroke-width="1"/>
    <!-- Tail wings -->
    <path d="M280 -10 L320 -30 L325 -25 L320 0 Z" fill="url(#plane)" stroke="#94a3b8" stroke-width="0.8"/>
    <path d="M280 80 L320 100 L325 95 L320 70 Z" fill="url(#plane)" stroke="#94a3b8" stroke-width="0.8"/>
    <!-- Body -->
    <path d="M40 30 Q-10 35 0 50 Q-10 65 40 70 L290 65 Q330 50 290 35 Z" fill="url(#plane)" stroke="#94a3b8" stroke-width="1"/>
    <!-- Cockpit -->
    <path d="M280 35 Q310 35 320 50 Q310 65 280 65" fill="#1e3a8a" opacity=".25"/>
    <path d="M283 38 Q305 38 313 50 Q305 62 283 62" fill="url(#planeWindow)"/>
    <!-- Stripe -->
    <rect x="40" y="46" width="250" height="4" fill="#3b82f6"/>
    <rect x="40" y="52" width="250" height="2" fill="#dc2626" opacity=".7"/>
    <!-- Windows -->
    <g fill="#1e3a8a">
      <circle cx="60" cy="45" r="2.5"/>
      <circle cx="80" cy="45" r="2.5"/>
      <circle cx="100" cy="45" r="2.5"/>
      <circle cx="120" cy="45" r="2.5"/>
      <circle cx="140" cy="45" r="2.5"/>
      <circle cx="160" cy="45" r="2.5"/>
      <circle cx="180" cy="45" r="2.5"/>
      <circle cx="200" cy="45" r="2.5"/>
      <circle cx="220" cy="45" r="2.5"/>
      <circle cx="240" cy="45" r="2.5"/>
      <circle cx="260" cy="45" r="2.5"/>
    </g>
    <!-- Engines -->
    <g fill="#475569" stroke="#1e293b" stroke-width="0.8">
      <ellipse cx="100" cy="80" rx="20" ry="12"/>
      <ellipse cx="200" cy="80" rx="20" ry="12"/>
      <circle cx="100" cy="80" r="7" fill="#0f172a"/>
      <circle cx="200" cy="80" r="7" fill="#0f172a"/>
      <circle cx="100" cy="80" r="4" fill="#475569"/>
      <circle cx="200" cy="80" r="4" fill="#475569"/>
    </g>
    <!-- Landing gear -->
    <g fill="#1e293b">
      <rect x="96" y="92" width="2" height="14"/>
      <rect x="102" y="92" width="2" height="14"/>
      <ellipse cx="100" cy="108" rx="6" ry="3"/>
      <rect x="196" y="92" width="2" height="14"/>
      <rect x="202" y="92" width="2" height="14"/>
      <ellipse cx="200" cy="108" rx="6" ry="3"/>
      <rect x="148" y="76" width="2" height="14"/>
      <rect x="154" y="76" width="2" height="14"/>
      <ellipse cx="151" cy="92" rx="5" ry="2.5"/>
    </g>
  </g>

  <!-- Light reflection sparkles -->
  <g opacity=".7">
    <path d="M170 90l2 5 5 2-5 2-2 5-2-5-5-2 5-2z" fill="#fff"/>
    <circle cx="500" cy="120" r="3" fill="#fff" opacity=".6"/>
    <circle cx="80" cy="240" r="2.5" fill="#fff" opacity=".6"/>
  </g>
</svg>
